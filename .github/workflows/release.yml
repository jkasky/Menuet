name: Release

# Cuts a signed, notarized DMG and attaches it to a GitHub Release.
# Triggered only by pushing a v* tag. Tag creation is restricted to admins via
# a repository tag ruleset, so only admins can start a release. Signing and
# notarization credentials live on the `release` environment (see below), which
# is itself restricted to v* tag deployments.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    environment: release
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so `git rev-list --count HEAD` yields a real build number.
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.6.app/Contents/Developer

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import Developer ID certificate
        env:
          CERT_P12_B64: ${{ secrets.DEVELOPER_ID_CERT_P12_B64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          # Remove the decoded .p12 even if a command below fails mid-step.
          trap 'rm -f "$RUNNER_TEMP/cert.p12"' EXIT
          echo "$CERT_P12_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          # Prepend our keychain to the search list so codesign can find the identity.
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | xargs)

      # Note: later steps re-derive VERSION from $GITHUB_REF_NAME in-shell rather
      # than passing it through `${{ }}` interpolation — tag names may contain
      # `$`, backticks, and quotes, so inlining them into scripts is injectable.
      - name: Set build number
        run: |
          set -euo pipefail
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleVersion $(git rev-list --count HEAD)" Source/Info.plist

      - name: Archive
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/build.keychain-db"
          xcodebuild archive \
            -project Menuet.xcodeproj \
            -scheme Menuet \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Menuet.xcarchive" \
            SENTRY_DSN="$SENTRY_DSN" \
            MARKETING_VERSION="$VERSION" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=36L9V28W3R \
            OTHER_CODE_SIGN_FLAGS=--timestamp

      - name: Export and verify app
        run: |
          set -euo pipefail
          mkdir -p export
          cp -R "$RUNNER_TEMP/Menuet.xcarchive/Products/Applications/Menuet.app" export/
          codesign --verify --deep --strict --verbose=2 export/Menuet.app

      - name: Notarize and staple app
        env:
          ASC_API_KEY_P8_B64: ${{ secrets.ASC_API_KEY_P8_B64 }}
          ASC_API_KEY_ID: ${{ vars.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ vars.ASC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          echo "$ASC_API_KEY_P8_B64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          ditto -c -k --keepParent export/Menuet.app "$RUNNER_TEMP/Menuet.zip"
          xcrun notarytool submit "$RUNNER_TEMP/Menuet.zip" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$ASC_API_KEY_ID" \
            --issuer "$ASC_API_ISSUER_ID" \
            --wait --timeout 30m
          xcrun stapler staple export/Menuet.app

      - name: Build DMG
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # create-dmg drives Finder via AppleScript for the drop-link layout,
          # which is flaky on headless runners — retry a few times.
          for attempt in 1 2 3; do
            if create-dmg \
              --volname "Menuet" \
              --app-drop-link 400 200 \
              "Menuet-$VERSION.dmg" \
              export/; then
              exit 0
            fi
            echo "create-dmg attempt $attempt failed; retrying..." >&2
            rm -f "Menuet-$VERSION.dmg" rw.*.dmg
            sleep 5
          done
          exit 1

      - name: Sign, notarize, and staple DMG
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          ASC_API_KEY_ID: ${{ vars.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ vars.ASC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          DMG="Menuet-${GITHUB_REF_NAME#v}.dmg"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/build.keychain-db"
          codesign --sign "Developer ID Application" --timestamp "$DMG"
          xcrun notarytool submit "$DMG" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$ASC_API_KEY_ID" \
            --issuer "$ASC_API_ISSUER_ID" \
            --wait --timeout 30m
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            "Menuet-${GITHUB_REF_NAME#v}.dmg" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      - name: Clean up credentials
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
          rm -f "$RUNNER_TEMP/AuthKey.p8" "$RUNNER_TEMP/cert.p12"
