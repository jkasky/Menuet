name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Run tests
        run: xcodebuild -project Menuet.xcodeproj -scheme Menuet test -only-testing:MenuetTests -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO
